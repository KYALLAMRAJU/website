name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Lint + Code Quality ─────────────────────────────────────────────
  # Runs ruff (fast Python linter + formatter check).
  # Fails fast — no point running tests if the code has lint errors.
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install ruff
      run: pip install ruff

    - name: Run ruff linter
      run: ruff check . --output-format=github

    - name: Run ruff formatter check
      run: ruff format . --check


  # ── Job 2: Tests ───────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint       # Only run tests if lint passes

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: advaitam_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-prod.txt

    - name: Run migrations
      env:
        DEBUG: False
        SECRET_KEY: test-secret-key-not-used-in-production
        DB_NAME: advaitam_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_HOST: localhost
        DB_PORT: 5432
        USE_S3: False
      run: python manage.py migrate

    - name: Run tests
      env:
        DEBUG: False
        SECRET_KEY: test-secret-key-not-used-in-production
        DB_NAME: advaitam_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_HOST: localhost
        DB_PORT: 5432
        USE_S3: False
      run: python manage.py test

    - name: Check Django
      env:
        DEBUG: False
        SECRET_KEY: test-secret-key-not-used-in-production
        DB_NAME: advaitam_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_HOST: localhost
        DB_PORT: 5432
        USE_S3: False
      run: python manage.py check --deploy

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to EC2
      env:
        PRIVATE_KEY: ${{ secrets.AWS_EC2_PRIVATE_KEY }}
        HOST: ${{ secrets.AWS_EC2_HOST }}
        USER: ubuntu
      run: |
        mkdir -p ~/.ssh
        echo "$PRIVATE_KEY" > ~/.ssh/deploy_key.pem
        chmod 600 ~/.ssh/deploy_key.pem
        ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

        ssh -i ~/.ssh/deploy_key.pem $USER@$HOST << 'EOF'
          cd /home/advaitam/app
          git pull origin main
          source /home/advaitam/venv/bin/activate
          pip install -r requirements-prod.txt
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput
          # Graceful reload — in-flight requests finish before workers are replaced (zero downtime)
          # 'restart' kills workers immediately; 'reload' sends SIGHUP and waits for graceful_timeout
          sudo systemctl reload advaitam.service
          sudo systemctl reload nginx
        EOF

