# ============================================================
# nginx.conf — Advaitam Production Nginx Configuration
# ============================================================
# Location on EC2: /etc/nginx/sites-available/advaitam
# Enable with: sudo ln -s /etc/nginx/sites-available/advaitam /etc/nginx/sites-enabled/
# Test:        sudo nginx -t
# Reload:      sudo systemctl reload nginx
#
# Architecture:
#   Browser → CloudFront CDN → Nginx (EC2 port 80/443) → Gunicorn (Unix socket) → Django
#
# CloudFront handles:
#   - Global CDN / edge caching for static files (CSS, JS, images, audio, PDFs)
#   - HTTPS termination at the edge
#   - DDoS protection (AWS Shield Basic)
#
# Nginx handles:
#   - SSL termination for origin requests (between CloudFront and EC2)
#   - Reverse proxying HTML/API requests to Gunicorn
#   - Blocking direct EC2 IP access (must come through CloudFront)
#   - Security headers
#   - Rate limiting
# ============================================================

# ── Rate Limiting Zones ──────────────────────────────────────────────────────
# Define rate limit zones in the http block (add to /etc/nginx/nginx.conf if needed)
# These are referenced in the server block below.
#   $binary_remote_addr = client IP in binary form (smaller memory footprint than $remote_addr)
#   zone=general:10m   = shared memory zone "general", 10MB (stores ~160,000 IPs)
#   rate=30r/m         = allow 30 requests per minute per IP
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name advaitam.info www.advaitam.info origin.advaitam.info;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS Server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name advaitam.info www.advaitam.info origin.advaitam.info;

    # ── SSL Configuration ────────────────────────────────────────────────────
    # Certificate managed by Certbot (Let's Encrypt)
    # Run: sudo certbot --nginx -d advaitam.info -d www.advaitam.info -d origin.advaitam.info
    ssl_certificate     /etc/letsencrypt/live/advaitam.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/advaitam.info/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── CloudFront Origin Protection ─────────────────────────────────────────
    # Only accept requests that include the CloudFront secret header.
    # CloudFront is configured to always add X-CloudFront-Secret: <value>
    # Direct access to the EC2 IP returns 403 Forbidden.
    # Set CLOUDFRONT_SECRET in your .env.production.bak to match this value.
    set $cloudfront_secret "REPLACE_WITH_YOUR_CLOUDFRONT_SECRET";

    if ($http_x_cloudfront_secret != $cloudfront_secret) {
        return 403 "Direct access not allowed. Use the CDN.";
    }

    # ── Security Headers ─────────────────────────────────────────────────────
    # These complement Django's own security settings (settings.py SECURE_* values).
    # Django adds HSTS, X-Frame-Options, etc. — Nginx adds a few extras here.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /home/advaitam/app/logs/nginx_access.log;
    error_log  /home/advaitam/app/logs/nginx_error.log warn;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/rss+xml font/truetype font/opentype image/svg+xml;

    # ── Buffer & Timeout Settings ─────────────────────────────────────────────
    client_max_body_size    10M;   # max upload size (increase if accepting large file uploads)
    proxy_connect_timeout   30s;
    proxy_send_timeout     120s;   # matches Gunicorn timeout = 120s
    proxy_read_timeout     120s;
    send_timeout           120s;
    keepalive_timeout       65s;

    # ── Health Check — no rate limiting, no CloudFront secret check ──────────
    location = /health/ {
        proxy_pass         http://unix:/run/advaitam/gunicorn.sock;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow direct access (used by ALB health checks, uptime monitors)
        allow all;
    }

    # ── Auth Endpoints — strict rate limiting (10 req/min) ───────────────────
    # Protects login/signup/password-reset from brute-force attacks.
    location ~* ^/(loginpage|signupform|forgotpassword|accounts/login)/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://unix:/run/advaitam/gunicorn.sock;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API Endpoints — moderate rate limiting (60 req/min) ──────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://unix:/run/advaitam/gunicorn.sock;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # ── Main Application — general rate limiting (30 req/min) ────────────────
    location / {
        limit_req zone=general burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://unix:/run/advaitam/gunicorn.sock;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        # Required for Django's SECURE_PROXY_SSL_HEADER setting
        # Tells Django the original request was HTTPS even though Nginx passes it as HTTP
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Static Files — served by WhiteNoise/S3 in production ─────────────────
    # When USE_S3=True, these requests never reach Nginx — CloudFront serves them.
    # When USE_S3=False (e.g. Docker dev), Django/WhiteNoise serves them.
    # This location block is a fallback only.
    location /static/ {
        alias /home/advaitam/app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Block hidden files ──────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

